<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYCheapEats | Grubhub Alternative</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">🍕 NYCheapEats</div>
        <div class="search-container">
            <input type="text" id="addressSearch" placeholder="Enter NYC delivery address or zip..." value="10012">
            <button class="search-btn">Search</button>
        </div>
        <div class="user-actions">
            <button class="login-btn">Sign In</button>
            <button class="cart-btn">🛒 Cart</button>
        </div>
    </nav>

    <section class="filters">
        <div class="filter-group">
            <button class="filter-chip active" data-max="20">Under $20</button>
            <button class="filter-chip" data-max="15">Under $15</button>
            <button class="filter-chip" data-max="10">Under $10</button>
            <button class="filter-chip">Free Delivery</button>
            <button class="filter-chip">Pickup</button>
        </div>
        <div class="view-toggle">
            <button class="toggle-btn active" id="listViewBtn">List</button>
            <button class="toggle-btn" id="mapViewBtn">Map</button>
        </div>
    </section>

    <main class="main-container">
        <div id="restaurantList" class="restaurant-grid">
            </div>

        <div id="mapContainer" class="map-container hidden">
            <div id="map"></div>
        </div>
    </main>

    <script src="app.js"></script>
    <script async defer src="https://ybgnuyenwqqylxtlunzp.supabase.co/"></script>
</body>
</html>
