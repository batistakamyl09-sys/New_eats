<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Budget Bites NYC</title>
  <link rel="stylesheet" href="style.css">

  <!-- ✅ SUPABASE CDN (REQUIRED) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script src="app.js" defer></script>
</head>
<body>

<header class="header">
  <h1>🍔 Budget Bites NYC</h1>

  <!-- ✅ AUTH UI (ADDED — matches JS exactly) -->
  <div id="authBox" style="margin-bottom:10px;">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="signup">Sign Up</button>
    <button id="login">Login</button>
    <button id="logout" style="display:none;">Logout</button>
  </div>

  <input type="text" id="search" placeholder="Search cheap eats...">

  <div class="controls">
    <select id="boroughFilter">
      <option value="all">All Boroughs</option>
      <option value="Manhattan">Manhattan</option>
      <option value="Brooklyn">Brooklyn</option>
      <option value="Queens">Queens</option>
      <option value="Bronx">Bronx</option>
      <option value="Staten Island">Staten Island</option>
    </select>

    <select id="sortFilter">
      <option value="default">Sort</option>
      <option value="value">Best Value</option>
      <option value="cheap">Cheapest</option>
    </select>

    <label class="toggle">
      <input type="checkbox" id="budgetToggle">
      Under $20
    </label>
  </div>
</header>

<main id="restaurantList"></main>

<div id="modal" class="modal hidden">
  <div class="modal-content">
    <span id="closeModal">&times;</span>
    <div id="modalBody"></div>
  </div>
</div>

</body>
</html>
